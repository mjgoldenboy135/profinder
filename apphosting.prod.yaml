# apphosting.yaml
# Corrected configuration for Firebase App Hosting environment variables

build:
  command: npm run build
  env:
    # Map the secret 'NEXT_PUBLIC_GOOGLE_MAPS_API_KEY' to the environment variable 'NEXT_PUBLIC_GOOGLE_MAPS_API_KEY'
    - variable: NEXT_PUBLIC_GOOGLE_MAPS_API_KEY
      secret: NEXT_PUBLIC_GOOGLE_MAPS_API_KEY
    # Map the secret 'NEXT_PUBLIC_GOOGLE_MAPS_ID' to the environment variable 'NEXT_PUBLIC_GOOGLE_MAPS_ID'
    - variable: NEXT_PUBLIC_GOOGLE_MAPS_ID
      secret: NEXT_PUBLIC_GOOGLE_MAPS_ID

run:
  command: npm run start
  port: 3000
  env:
    # Map the secret 'NEXT_PUBLIC_GOOGLE_MAPS_API_KEY' to the environment variable 'NEXT_PUBLIC_GOOGLE_MAPS_API_KEY'
    - variable: NEXT_PUBLIC_GOOGLE_MAPS_API_KEY
      secret: NEXT_PUBLIC_GOOGLE_MAPS_API_KEY
    # Map the secret 'NEXT_PUBLIC_GOOGLE_MAPS_ID' to the environment variable 'NEXT_PUBLIC_GOOGLE_MAPS_ID'
    - variable: NEXT_PUBLIC_GOOGLE_MAPS_ID
      secret: NEXT_PUBLIC_GOOGLE_MAPS_ID
