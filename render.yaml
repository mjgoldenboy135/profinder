# Render Blueprint for Profinder (Django backend + Next.js frontend).
#
# Deploy: on https://render.com choose "New +" -> "Blueprint", connect this
# repository and select the branch. Render reads this file from the repo root
# and provisions everything below in one go. No manual environment variables
# are required — the frontend is wired to the backend automatically.
#
# It creates:
#   * profinder-db      - managed PostgreSQL database
#   * profinder-backend - Django API + chat WebSocket (Daphne ASGI server)
#   * profinder        - the Next.js app

databases:
  - name: profinder-db
    plan: free
    databaseName: profinder
    user: profinder

services:
  - type: web
    name: profinder-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "daphne -b 0.0.0.0 -p $PORT profinder.asgi:application"
    healthCheckPath: /api/health/
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
      - key: DATABASE_URL
        fromDatabase:
          name: profinder-db
          property: connectionString
      - key: CORS_ALLOWED_ORIGIN_REGEXES
        value: "^https://.*\\.onrender\\.com$"
      - key: WS_ALLOWED_ORIGINS
        value: "*"
      # Used to build password-reset links pointing at the frontend.
      - key: FRONTEND_URL
        fromService:
          type: web
          name: profinder
          property: host
      # --- Email delivery (verification + password reset) via Brevo -----------
      # Render's FREE tier blocks all outbound SMTP ports (25/465/587), so
      # Gmail SMTP cannot work here — connections hang until killed. Brevo
      # sends over HTTPS instead (not blocked; free 300 emails/day).
      # Setup: sign up at https://www.brevo.com (use mohsinjamal135@gmail.com),
      # then dashboard > SMTP & API > API keys > create key (starts with
      # "xkeysib-") and paste it in the Render dashboard when prompted.
      # Leaving it empty keeps the verification gate OFF and prints email
      # links to the logs instead, so signups are never blocked.
      - key: BREVO_API_KEY
        sync: false
      - key: DEFAULT_FROM_EMAIL
        value: "Profinder <mohsinjamal135@gmail.com>"
      # ------------------------------------------------------------------------
      # Google Sign-In. Must match NEXT_PUBLIC_GOOGLE_CLIENT_ID on the frontend.
      - key: GOOGLE_CLIENT_ID
        value: "862818079124-1dnadc132ul3j1arelarbjm7g13rag56.apps.googleusercontent.com"

  - type: web
    name: profinder
    runtime: node
    plan: free
    buildCommand: "npm install --include=dev && npm run build"
    startCommand: "npm start"
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NEXT_PUBLIC_API_HOST
        fromService:
          type: web
          name: profinder-backend
          property: host
      - key: NEXT_PUBLIC_MAPTILER_API_KEY
        value: "JV8uSkC9GWBrOW5wttXV"
      # Google Sign-In Client ID (public). Remember to add your frontend URL
      # (https://<frontend>.onrender.com) to the OAuth client's "Authorized
      # JavaScript origins" in the Google Cloud Console.
      - key: NEXT_PUBLIC_GOOGLE_CLIENT_ID
        value: "862818079124-1dnadc132ul3j1arelarbjm7g13rag56.apps.googleusercontent.com"
