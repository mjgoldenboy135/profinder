name: Brevo email diagnostic
on:
  workflow_dispatch:
    inputs:
      to_email:
        description: Recipient for the test email
        required: true
        default: mjgoldenboy135@gmail.com
      sender_email:
        description: Sender address (must be verified in Brevo)
        required: true
        default: mohsinjamal135@gmail.com

jobs:
  diagnose:
    runs-on: ubuntu-latest
    env:
      BREVO_KEY: ${{ secrets.BREVO_API_KEY }}
    steps:
      - name: 0 - Check the secret is configured
        run: |
          if [ -z "$BREVO_KEY" ]; then
            echo "::error::Repository secret BREVO_API_KEY is not set. Add it under Settings > Secrets and variables > Actions."
            exit 1
          fi
          echo "Secret present (${#BREVO_KEY} characters)."

      - name: 1 - Validate API key (GET /v3/account)
        run: |
          code=$(curl -sS -o /tmp/account.json -w "%{http_code}" \
            -H "api-key: $BREVO_KEY" https://api.brevo.com/v3/account)
          echo "ACCOUNT_HTTP=$code"
          head -c 1500 /tmp/account.json; echo

      - name: 2 - List senders (GET /v3/senders)
        run: |
          code=$(curl -sS -o /tmp/senders.json -w "%{http_code}" \
            -H "api-key: $BREVO_KEY" https://api.brevo.com/v3/senders)
          echo "SENDERS_HTTP=$code"
          head -c 1500 /tmp/senders.json; echo

      - name: 3 - Send test email (POST /v3/smtp/email)
        run: |
          cat > /tmp/payload.json << 'EOF'
          {
            "sender": {"name": "Profinder", "email": "SENDER_PLACEHOLDER"},
            "to": [{"email": "TO_PLACEHOLDER"}],
            "subject": "Profinder diagnostic test email",
            "textContent": "If you can read this, the Brevo API key and sender work. The problem is on the Render side (env var or deploy)."
          }
          EOF
          sed -i "s/SENDER_PLACEHOLDER/${{ github.event.inputs.sender_email }}/" /tmp/payload.json
          sed -i "s/TO_PLACEHOLDER/${{ github.event.inputs.to_email }}/" /tmp/payload.json
          code=$(curl -sS -o /tmp/send.json -w "%{http_code}" -X POST \
            -H "api-key: $BREVO_KEY" \
            -H "content-type: application/json" \
            -d @/tmp/payload.json \
            https://api.brevo.com/v3/smtp/email)
          echo "SEND_HTTP=$code"
          cat /tmp/send.json; echo
