services:
  - type: web
    name: profinder-backend
    runtime: python
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "daphne -b 0.0.0.0 -p $PORT profinder.asgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost"
      - key: DATABASE_URL
        fromDatabase:
          name: profinder-db
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        value: "http://localhost:3000"
      - key: PYTHON_VERSION
        value: "3.11.0"

databases:
  - name: profinder-db
    databaseName: profinder
    user: profinder
    plan: free
