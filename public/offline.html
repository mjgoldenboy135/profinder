<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline — Profinder</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #f8fafc; color: #0f172a; text-align: center; padding: 24px;
      }
      @media (prefers-color-scheme: dark) { body { background: #0b1220; color: #e2e8f0; } }
      .card { max-width: 360px; }
      .logo { width: 72px; height: 72px; border-radius: 20px; margin: 0 auto 20px;
        background: linear-gradient(135deg, #0ea5e9, #0284c7); display: flex; align-items: center; justify-content: center; }
      h1 { font-size: 20px; margin: 0 0 8px; }
      p { color: #64748b; margin: 0 0 20px; line-height: 1.5; }
      button { background: #0ea5e9; color: #fff; border: 0; border-radius: 10px; padding: 12px 20px; font-size: 15px; font-weight: 600; cursor: pointer; }
      button:hover { background: #0284c7; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
          <path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
      </div>
      <h1>You're offline</h1>
      <p>Profinder needs an internet connection. Check your network and try again.</p>
      <button onclick="location.reload()">Retry</button>
    </div>
  </body>
</html>
