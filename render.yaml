# Render Blueprint for Profinder (Django backend + Next.js frontend).
#
# Deploy: on https://render.com choose "New +" -> "Blueprint", connect this
# repository and select the branch. Render reads this file from the repo root
# and provisions everything below in one go. No manual environment variables
# are required — the frontend is wired to the backend automatically.
#
# It creates:
#   * profinder-db      - managed PostgreSQL database
#   * profinder-backend - Django API + chat WebSocket (Daphne ASGI server)
#   * profinder        - the Next.js app

databases:
  - name: profinder-db
    plan: free
    databaseName: profinder
    user: profinder

services:
  - type: web
    name: profinder-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "daphne -b 0.0.0.0 -p $PORT profinder.asgi:application"
    healthCheckPath: /api/health/
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
      - key: DATABASE_URL
        fromDatabase:
          name: profinder-db
          property: connectionString
      - key: CORS_ALLOWED_ORIGIN_REGEXES
        value: "^https://.*\\.onrender\\.com$"
      - key: WS_ALLOWED_ORIGINS
        value: "*"
      # Used to build password-reset links pointing at the frontend.
      - key: FRONTEND_URL
        fromService:
          type: web
          name: profinder
          property: host
      # --- Email delivery (verification + password reset) via Gmail SMTP ------
      # EMAIL_HOST_PASSWORD is `sync: false`: Render prompts for it in the
      # dashboard, keeping the secret out of the repo. Use a Gmail App Password
      # (Google Account > Security > 2-Step Verification > App passwords) — a
      # normal Gmail password is rejected by Google's SMTP servers.
      # Setting EMAIL_HOST also auto-enables REQUIRE_EMAIL_VERIFICATION for new
      # signups; set REQUIRE_EMAIL_VERIFICATION=False to turn the gate off.
      - key: EMAIL_HOST
        value: "smtp.gmail.com"
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USE_TLS
        value: "True"
      - key: EMAIL_HOST_USER
        value: "mj115135123@gmail.com"
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        value: "Profinder <mj115135123@gmail.com>"
      # ------------------------------------------------------------------------
      # Google Sign-In. Must match NEXT_PUBLIC_GOOGLE_CLIENT_ID on the frontend.
      - key: GOOGLE_CLIENT_ID
        value: "862818079124-1dnadc132ul3j1arelarbjm7g13rag56.apps.googleusercontent.com"

  - type: web
    name: profinder
    runtime: node
    plan: free
    buildCommand: "npm install --include=dev && npm run build"
    startCommand: "npm start"
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NEXT_PUBLIC_API_HOST
        fromService:
          type: web
          name: profinder-backend
          property: host
      - key: NEXT_PUBLIC_MAPTILER_API_KEY
        value: "JV8uSkC9GWBrOW5wttXV"
      # Google Sign-In Client ID (public). Remember to add your frontend URL
      # (https://<frontend>.onrender.com) to the OAuth client's "Authorized
      # JavaScript origins" in the Google Cloud Console.
      - key: NEXT_PUBLIC_GOOGLE_CLIENT_ID
        value: "862818079124-1dnadc132ul3j1arelarbjm7g13rag56.apps.googleusercontent.com"
