name: Build signed Android app (TWA)

# Builds the Trusted Web Activity wrapper of the live site into a signed
# .aab (for Play Store) and .apk (for sideload testing) using Bubblewrap.
#
# Run it manually from the Actions tab (workflow_dispatch).
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   ANDROID_KEYSTORE_BASE64   base64 of your signing keystore file
#                             (see android/README.md to generate it)
#   ANDROID_KEYSTORE_PASSWORD keystore password
#   ANDROID_KEY_PASSWORD      key password (often the same)
#
# The signed .aab is uploaded as a build artifact you download and upload to
# the Play Console. The keystore never lives in the repo.

on:
  workflow_dispatch:
    inputs:
      versionName:
        description: "Version name (e.g. 1.0.0)"
        required: false
        default: ""
      versionCode:
        description: "Version code (integer, must increase each release)"
        required: false
        default: ""

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Restore signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/android.keystore
          test -s android/android.keystore || (echo "Keystore secret missing/empty" && exit 1)

      - name: Apply version overrides
        working-directory: android
        run: |
          if [ -n "${{ github.event.inputs.versionName }}" ]; then
            node -e "const f='twa-manifest.json';const m=require('./'+f);m.appVersionName='${{ github.event.inputs.versionName }}';require('fs').writeFileSync(f,JSON.stringify(m,null,2))"
          fi
          if [ -n "${{ github.event.inputs.versionCode }}" ]; then
            node -e "const f='twa-manifest.json';const m=require('./'+f);m.appVersionCode=Number('${{ github.event.inputs.versionCode }}');require('fs').writeFileSync(f,JSON.stringify(m,null,2))"
          fi

      - name: Generate Android project from twa-manifest.json
        working-directory: android
        run: bubblewrap update --skipVersionUpgrade || bubblewrap build --help >/dev/null

      - name: Build and sign
        working-directory: android
        env:
          KS_PW: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PW: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          # Bubblewrap prompts for the keystore then key password; feed both.
          printf '%s\n%s\n' "$KS_PW" "$KEY_PW" | bubblewrap build --skipPwaValidation

      - name: Upload signed bundle
        uses: actions/upload-artifact@v4
        with:
          name: profinder-android-release
          path: |
            android/app-release-bundle.aab
            android/app-release-signed.apk
          if-no-files-found: warn
