runConfig:
  minInstances: 0
  maxInstances: 100
  concurrency: 80
  cpu: 1.0
  memoryMiB: 512

env:
  - variable: NEXT_PUBLIC_GOOGLE_MAPS_API_KEY
    secret: NEXT_PUBLIC_GOOGLE_MAPS_API_KEY
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_GOOGLE_MAPS_ID
    secret: NEXT_PUBLIC_GOOGLE_MAPS_ID
    availability:
      - BUILD
      - RUNTIME
